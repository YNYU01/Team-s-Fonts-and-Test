<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
</head>
<body style="margin: 0; padding: 0;">
<div style="
  aspect-ratio: 1125/2436;
  width: 100%;
  height: 100%; 
  display: flex; 
  justify-content: center; 
  align-self: center; ">
    <div style="aspect-ratio: 1125/2436;
    width: 100%; 
    height: 100%; 
    max-width: 375px; overflow: hidden;">
      <div style="
      aspect-ratio: 1125/2436;
      width: 100%; 
      max-width: 375px;
      display: flex; 
      justify-content: center; 
      align-self: center; 
      background: url('20260528-114204.jpg');
      background-size: contain;">
      <div style="backdrop-filter: url('#rippleEffect'); position: absolute;width: 100%; height: 100%; z-index: 1;"></div>
    </div>
  </div>
</div>
<svg width="100%" height="100%">
  <defs>
    <filter id="rippleEffect" x="10%" y="10%" width="80%" height="80%">
      <!-- 创建湍流纹理 -->
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="4" result="turbulence">
        <animate attributeName="baseFrequency" values="0.002;0.007;0.003;0.002" dur="5s" repeatCount="indefinite"></animate>
      </feTurbulence>
      <!-- 应用位移贴图 -->
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="10"></feDisplacementMap>
    </filter>
  </defs>
</svg>
  
</body>
