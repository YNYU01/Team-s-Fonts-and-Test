<div style="top: 0; left: 0; backdrop-filter: url('#rippleEffect2'); position: absolute; width: 100%; height: 100%; z-index: 2;"></div>
<img src="20260528-114204.jpg" alt="niandu" style="transform: translate(-10px,-10px); width: calc(100% + 20px);">
<svg width="100%" height="100%">
    <defs>
      <!-- 定义滤镜 -->
      <filter id="rippleEffect">
        <!-- 创建湍流纹理 -->
        <feTurbulence type="turbulence" baseFrequency="0.001" numOctaves="2" result="turbulence">
          <animate attributeName="baseFrequency" values="0.001;0.001;0.001;0.001;0.002;0.001;0.001" dur="2s" repeatCount="indefinite"></animate>
        </feTurbulence>
        <!-- 应用位移贴图 -->
        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="10"></feDisplacementMap>
      </filter>
      <!-- 定义滤镜 -->
      <filter id="rippleEffect2">
        <!-- 创建湍流纹理 -->
        <feTurbulence type="fractalNoise" baseFrequency="0.002" numOctaves="4" result="turbulence">
          <animate attributeName="baseFrequency" values="0.002;0.002;0.002;0.002;0.006;0.003;0.002" dur="2s" repeatCount="indefinite"></animate>
        </feTurbulence>
        <!-- 应用位移贴图 -->
        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="20"></feDisplacementMap>
      </filter>
    </defs>
  </svg>
